name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # The committed bun.lock pins an internal registry mirror
      # (europe-west4-npm.pkg.dev/...) that public runners can't reach. Rewrite
      # the host to public npm before install — the tarball paths map 1:1, so
      # exact versions are preserved. Durable even if the lockfile is re-pinned.
      - name: Point lockfile at public npm
        run: sed -E -i 's#https://[a-z0-9-]+\.pkg\.dev/[^/]+/[^/]+/#https://registry.npmjs.org/#g' bun.lock

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      # Build before typecheck: the TanStack Start plugin (re)generates
      # src/routeTree.gen.ts during the build. In the OSS mirror that file is
      # gitignored (it must not reference EE routes stripped from the public
      # build), so it only exists after a build. vite build does not enforce
      # types, so the typecheck step below still catches type errors against the
      # freshly generated route tree.
      - name: Build (open edition)
        run: bun run build

      - name: Typecheck
        run: bunx tsc --noEmit
