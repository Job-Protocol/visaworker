name: gitleaks

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly sweep in case something slips past PR review
    - cron: "0 9 * * 1"

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
